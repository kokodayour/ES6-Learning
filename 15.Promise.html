<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise</title>
  </head>
  <body></body>
  <script>
    const p = new Promise(function (resolve, reject) {
      setTimeout(() => {
        // let data = "success!";
        // resolve(data);
        let data = "faile!";
        reject(data);
      }, 1000);
    });
    p.then(
      function (value) {
        console.log(value);
      },
      function (err) {
        console.error(err);
      }
    );
  </script>
</html>
