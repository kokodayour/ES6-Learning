<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise-catch</title>
  </head>
  <body></body>
  <script>
    const p = new Promise((resolve, reject) => {
      setTimeout(() => {
        reject("hhh");
      }, 1000);
    });
    //相当于then方法的一个语法糖吧
    p.catch((err) => {
      console.error(err);
    });
  </script>
</html>
