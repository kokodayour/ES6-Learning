<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>集合Set</title>
  </head>
  <body></body>
  <script>
    //同数学中的集合, 与python相似
    let s = new Set();
    let s2 = new Set([1, 2, 3, 4, 5, 4, 3, 1, 6, 7, 4]);
    console.log(s2.size);
    s2.add(10);
    s2.delete(5);
    console.log(s2);
    console.log(s2.has(11));
    for (let v of s2) {
      console.log(v);
    }
    s2.clear();
    console.log(s2);

    //1.数组去重
    let arr = [1, 2, 3, 4, 5, 6, 7, 3, 45, 23, 21, 23, 4, 3, 2];
    let result = [...new Set(arr)];
    console.log(result);

    //2.交集
    let arr2 = [1, 23, 4, 2, 13, 3, 51, 2, 241, 24, 5, 23, 21, 5, 6, 7];
    // let result2 = [...new Set(arr)].filter((item) => {
    //   let arr = new Set(arr2);
    //   if (arr.has(item)) {
    //     return true;
    //   } else {
    //     return false;
    //   }
    // });

    let result2 = [...new Set(arr)].filter((item) => new Set(arr2).has(item));
    console.log(result2);

    //交集
    let arr3 = [1, 2, 3, 4, 5];
    let arr4 = [4, 5, 6, 7, 8, 9];
    let union = [...new Set([...arr3, ...arr4])];
    console.log(union);

    //差集
    let diff = [...new Set(arr3)].filter((item) => !new Set(arr4).has(item));
    console.log(diff);
  </script>
