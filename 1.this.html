<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>this</title>
  </head>
  <body>
    函数是对象的方法 在 JavaScript 中，被称为
    this的事物，指的是“拥有”当前代码的对象。 this总是指向调用某个方法的对象.
    函数的调用方式决定了 this 的值（运行时绑定）
    如果代码没有在任何函数中执行，而是在全局作用域中执行时，this的值就是global对象，对于浏览器来说，this就是window
  </body>
</html>
