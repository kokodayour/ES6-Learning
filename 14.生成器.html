<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生成器</title>
  </head>
  <body>
    ES6 新引入了 Generator 函数,可以通过 yield
    关键字,把函数的执行流挂起,为改变执行流程提供了可能,从而为异步编程提供解决方案。
  </body>
  <script>
    //在function后面有一个*
    //yield表示函数内部的状态(函数指针...)
    //感觉有点像返回多次的函数
    function* func() {
      console.log("1");
      let one = yield "1"; //此时的one就代表yield "1"
      console.log(one);
      console.log("2");
      yield "2";
      console.log("3");
      yield "3";
    }

    //Generator 函数不会像普通函数一样立即执行，而是返回一个指向内部状态对象的指针，所以要调用遍历器对象Iterator 的 next 方法，指针就会从函数头部或者上一次停下来的地方开始执行。
    //next()会执行yield之前的语句, 并且将yield 后边表达式的值 '1'，作为返回对象的 value 属性值，此时函数还没有执行完， 返回对象的 done 属性值是 false
    let fn = func();
    console.log(fn.next());
    //next()在执行下一个yield时候先将参数返回出去, 传入参数表示上一个yield整体的返回结果
    console.log(fn.next(22));
    console.log(fn.next());
    console.log(fn.next());
  </script>
  <script>
    //生成器实例
    function func1() {
      setTimeout(() => {
        console.log(1);
        funcTest.next();
      }, 1000);
    }
    function func2() {
      setTimeout(() => {
        console.log(2);
        funcTest.next();
      }, 2000);
    }
    function func3() {
      setTimeout(() => {
        console.log(3);
        funcTest.next();
      }, 3000);
    }

    function* funcGen() {
      yield func1();
      yield func2();
      yield func3();
    }

    const funcTest = funcGen();
    funcTest.next();
  </script>

  </script>
</html>
